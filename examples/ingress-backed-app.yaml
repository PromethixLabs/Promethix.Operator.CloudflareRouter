apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: demo
spec:
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: demo
  annotations:
    external-dns.alpha.kubernetes.io/hostname: whoami.delta.promethix.net
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: edge-system-forward-auth@kubernetescrd
spec:
  ingressClassName: traefik-cloudflare-tunnel
  tls:
    - hosts:
        - whoami.delta.promethix.net
      secretName: whoami-delta-promethix-net-tls
  rules:
    - host: whoami.delta.promethix.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
---
apiVersion: edge.promethix.net/v1alpha1
kind: TunnelPublicHostname
metadata:
  name: whoami-public
  namespace: demo
spec:
  className: public
  hostname: whoami.delta.promethix.net
  enabled: true
  tunnelRef:
    name: delta-public
  target:
    mode: ingress
    ingress:
      className: traefik-cloudflare-tunnel
      service:
        name: traefik-cloudflare-tunnel
        namespace: edge-system
        port: 443
        scheme: https
      # The operator will emit originRequest.originServerName=whoami.delta.promethix.net
      # so cloudflared verifies the Traefik certificate against the public hostname.
  cloudflare:
    proxied: true
