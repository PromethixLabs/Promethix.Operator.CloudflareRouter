apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnelpublichostnames.edge.promethix.net
spec:
  group: edge.promethix.net
  scope: Namespaced
  names:
    plural: tunnelpublichostnames
    singular: tunnelpublichostname
    kind: TunnelPublicHostname
    shortNames:
      - tph
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["className", "hostname", "tunnelRef", "origin"]
              properties:
                className:
                  type: string
                hostname:
                  type: string
                enabled:
                  type: boolean
                tunnelRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                origin:
                  type: object
                  required: ["url", "protocol"]
                  properties:
                    url:
                      type: string
                    protocol:
                      type: string
                      enum: ["http", "https"]
                cloudflare:
                  type: object
                  properties:
                    proxied:
                      type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                ownershipTag:
                  type: string
                appliedTunnelName:
                  type: string
                appliedHostname:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
