apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "promethix-cloudflare-tunnel-operator.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "promethix-cloudflare-tunnel-operator.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "promethix-cloudflare-tunnel-operator.serviceAccountName" . }}
    namespace: {{ include "promethix-cloudflare-tunnel-operator.namespace" . }}
